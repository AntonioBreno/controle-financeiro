{% extends 'base.html' %}

{% block content %}

<h2>Lista de Categorias</h2>

<ul>
    {% for categoria in categorias %}
        <li>{{ categoria.nome }}</li>
    {% empty %}
        <li>Nenhuma categoria cadastrada.</li>
    {% endfor %}
</ul>

<a href="{% url 'categoria_create' %}" class="btn btn-primary mt-3">
    Nova Categoria
</a>

{% endblock %}
