{% extends 'base.html' %}

{% block content %}
<h2>Nova Categoria</h2>

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">Salvar</button>
</form>

<hr>

<h2>Lista de Categorias</h2>

<ul>
    {% for categoria in categorias %}
        <li>{{ categoria.nome }}</li>
    {% empty %}
        <li>Nenhuma categoria cadastrada.</li>
    {% endfor %}
</ul>
{% endblock %}
