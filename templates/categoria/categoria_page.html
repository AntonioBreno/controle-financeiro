{% extends 'base.html' %}

{% block content %}
<h2>Nova Categoria</h2>

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">Salvar</button>
</form>

<hr>

<h2>Lista de Categorias</h2>

<!-- Tabela personalizada -->
    <div class="table-responsive">
        <table class="table table-hover mb-0">
            <thead class="text-white" style="background-color: #07b29b;"> <!-- Bootstrap verde escuro -->
                <tr>
                    <th>Nome</th>
                    <th>Valor Padrão</th>
                </tr>
            </thead>
            <tbody>
                {% for categoria in categoria %}
                <tr onclick="window.location.href='{% url 'categoria_detail' categoria.pk %}'"
                    style="cursor: pointer;"
                    class="{% if forloop.counter|divisibleby:2 %}linha-verde{% else %}linha-branca{% endif %}" title="Ver detalhes">
                    <td>{{ categoria.nome }}</td>
                    <td>{{ categoria.valor_padrao }}</td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="2" class="text-center">Nenhuma categoria localizada.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
{% endblock %}
