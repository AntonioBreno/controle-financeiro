{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Sistema Financeiro</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
        

</head>

<body>

    <div class="layout" id="layout">

        <header class="header">
            <button id="toggleBtn" class="toggle-btn">☰</button>
            <h1>Sistema Financeiro</h1>
            <!-- Search form -->
            <form class="d-flex" role="search">
                <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />
                <button class="btn btn-light" type="submit"><i class="bi bi-search"></i></button>
            </form>
            <nav class="ms-auto"> 
                <div class="dropdown">
                    <button class="btn btn-secondary " type="button" data-bs-toggle="dropdown"
                        aria-expanded="false">
                        {{ user.username }}
                    </button>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="#">Action</a></li>
                        <li><a class="dropdown-item" href="#">Another action</a></li>
                        <li>
                            <a class="dropdown-item" href="#">
                                <form method="post" action="{% url 'logout' %}">{% csrf_token %}<button type="submit"
                                        class="btn btn-link">Sair</button></form>
                            </a>
                        </li>
                    </ul>
                </div>

            </nav>
        </header>

        <aside class="sidebar" id="sidebar">
            <nav>
                <ul>
                    <li><a href="{% url 'dashboard' %}">Home</a></li>
                    <li><a href="{% url 'transacao_list_create' %}">Movimentação</a></li>
                    <li><a href="{% url 'categoria_list_create' %}">Categoria</a></li>
                    <li><a href="{% url 'formaPagamento_list_create' %}">Forma de Pagamento</a></li>
                    
                </ul>
            </nav>
        </aside>

        <main class="content">
            <div class="w-75 mx-auto">
                {% block content%}

                {% endblock %}
            </div>
        </main>

        <footer class="footer">
            <p>© 2026 - Sistema Financeiro</p>
        </footer>

    </div>

    <script src="{% static 'js/script.js' %}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
